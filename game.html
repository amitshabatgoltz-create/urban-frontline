<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>Urban Frontline - Game</title>
<script src="https://cdn.jsdelivr.net/npm/simplex-noise@2.4.0/simplex-noise.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --cyan:#00e5ff;--cyan2:#00cfff;--blue:#0066cc;
  --dark:#050d1a;--panel:rgba(5,18,35,0.88);
  --border:rgba(0,200,255,0.35);--glow:0 0 12px rgba(0,200,255,0.5);
}
body{background:#000;overflow:hidden;font-family:'Rajdhani',monospace;user-select:none;}
canvas{display:block;width:100vw;height:100vh;}

/* ── HUD ── */
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;display:none;}

/* Health / Shield panel */
#hud{
  position:absolute;bottom:92px;left:16px;
  background:var(--panel);border:1px solid var(--border);
  border-radius:10px;padding:10px 16px;color:#e0f4ff;
  font-size:14px;font-weight:600;line-height:2;
  box-shadow:var(--glow);min-width:170px;
}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:2px;}
.bar-bg{flex:1;height:7px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width 0.3s;}
#hpFill{background:linear-gradient(90deg,#ff4466,#ff8899);}
#shFill{background:linear-gradient(90deg,#00cfff,#88eeff);}

/* Alive counter */
#ac{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);
  background:var(--panel);border:1px solid var(--border);
  color:var(--cyan);font-size:13px;font-weight:700;
  padding:5px 18px;border-radius:20px;letter-spacing:1px;box-shadow:var(--glow);
}

/* Kill feed */
#kf{position:absolute;top:14px;right:14px;text-align:right;max-width:240px;}
#kf div{background:var(--panel);border-left:3px solid #ff4466;color:#ffd0d8;font-size:11px;padding:3px 10px;border-radius:4px;margin-bottom:3px;font-weight:600;}

/* Crosshair */
#ch{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}

/* Damage vignette */
#dmgo{position:absolute;inset:0;border:5px solid #ff3355;opacity:0;transition:opacity 0.3s;pointer-events:none;box-shadow:inset 0 0 60px rgba(255,50,80,0.4);}

/* Hitmarker */
#hmk{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:none;pointer-events:none;}

/* Muzzle flash */
#fl{position:absolute;top:42%;left:56%;transform:translate(-50%,-50%);
  width:55px;height:55px;border-radius:50%;
  background:radial-gradient(circle,#fff 0%,#88ddff 40%,transparent 70%);
  display:none;pointer-events:none;}

/* Reload */
#rlt{
  position:absolute;bottom:160px;left:50%;transform:translateX(-50%);
  color:var(--cyan);font-weight:700;font-size:15px;display:none;
  letter-spacing:2px;text-shadow:0 0 10px var(--cyan);
}

/* Zone */
#zoneBox{
  position:absolute;top:50px;right:16px;
  background:var(--panel);border:1px solid var(--border);
  border-radius:10px;padding:8px 14px;
  color:#ffaa00;font-size:12px;font-weight:700;
  box-shadow:var(--glow);text-align:center;
}
#zdt{
  position:absolute;bottom:140px;left:50%;transform:translateX(-50%);
  color:#ffaa00;font-size:13px;display:none;font-weight:600;
}

/* Tip */
#tip{
  position:absolute;bottom:72px;left:50%;transform:translateX(-50%);
  color:rgba(0,200,255,0.35);font-size:10px;white-space:nowrap;letter-spacing:1px;
}

/* ── INVENTORY ── */
#inv{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:8px;}
.invSlot{
  width:72px;height:72px;background:var(--panel);
  border:1px solid rgba(0,200,255,0.2);border-radius:10px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:10px;color:#6699aa;position:relative;transition:all 0.15s;
  box-shadow:0 2px 8px rgba(0,0,0,0.6);
}
.invSlot.active{border:2px solid var(--cyan);background:rgba(0,180,255,0.12);box-shadow:0 0 14px rgba(0,200,255,0.5);transform:translateY(-3px);}
.invSlot.empty{border:1px dashed rgba(0,200,255,0.1);color:#1a3040;}
.invSlot .slotNum{position:absolute;top:3px;left:6px;font-size:9px;color:var(--cyan);font-weight:700;}

/* ── CHEST PROMPT ── */
#chestPrompt{
  position:absolute;top:58%;left:50%;transform:translateX(-50%);
  display:none;flex-direction:column;align-items:center;gap:6px;
}
#chestPrompt>div{
  background:var(--panel);border:1px solid var(--cyan2);
  color:var(--cyan);font-size:13px;font-weight:700;
  padding:5px 16px;border-radius:20px;letter-spacing:1px;box-shadow:var(--glow);
}
#eBarWrap{width:140px;height:6px;background:rgba(0,200,255,0.1);border-radius:3px;overflow:hidden;border:1px solid var(--border);}
#eBar{height:100%;background:linear-gradient(90deg,var(--cyan2),#88eeff);width:0%;}

/* Ground loot hint */
#groundLootHint{
  position:absolute;top:55%;left:50%;transform:translateX(-50%);
  display:none;background:var(--panel);border:1px solid var(--cyan2);
  color:var(--cyan);font-size:13px;font-weight:700;
  padding:5px 16px;border-radius:20px;letter-spacing:1px;box-shadow:var(--glow);
}

/* ── LOOT POPUP ── */
#lootPopup{
  position:absolute;top:35%;left:50%;transform:translateX(-50%);
  display:none;background:var(--panel);border:1px solid var(--cyan);
  border-radius:12px;padding:14px 24px;color:#e0f4ff;font-size:13px;
  font-weight:600;text-align:center;min-width:190px;box-shadow:var(--glow);
  animation:fadeInUp 0.2s ease;
}
@keyframes fadeInUp{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

/* ADS */
#adsOverlay{position:absolute;inset:0;display:none;pointer-events:none;}

/* CLICK TO PLAY */
#click-screen{
  position:fixed;inset:0;background:rgba(0,0,0,0.87);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:white;z-index:100;cursor:pointer;
}
#click-screen h1{font-size:40px;font-weight:700;letter-spacing:4px;color:#00e5ff;margin-bottom:8px;}
#click-screen p{font-size:16px;color:#aaa;margin-bottom:4px;}

/* DEAD/WIN */
#dead-screen,#win-screen{
  position:fixed;inset:0;background:rgba(0,0,0,0.92);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  color:white;z-index:200;
}
#dead-screen h1{font-size:56px;font-weight:700;color:#ff4466;}
#win-screen h1{font-size:56px;font-weight:700;color:#00e5ff;}
.end-sub{font-size:16px;color:#aaa;margin:12px 0 24px;}
.btn-back{background:transparent;border:2px solid #00e5ff;color:#00e5ff;padding:12px 36px;font-size:16px;font-weight:700;border-radius:24px;cursor:pointer;font-family:Rajdhani,monospace;letter-spacing:2px;pointer-events:all;}
.btn-back:hover{background:rgba(0,200,255,0.1);}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<body>

<canvas id="cv"></canvas>

<!-- HUD -->
<div id="ui">
  <!-- Health/Shield -->
  <div id="hud">
    <div class="bar-row">
      <span style="font-size:15px;">❤️</span>
      <div class="bar-bg"><div class="bar-fill" id="hpFill" style="width:100%;"></div></div>
      <span id="hb" style="color:#ff8899;font-size:12px;min-width:32px;text-align:right;">150</span>
    </div>
    <div class="bar-row">
      <span style="font-size:15px;">🛡️</span>
      <div class="bar-bg"><div class="bar-fill" id="shFill" style="width:0%;"></div></div>
      <span id="shieldVal" style="color:#88eeff;font-size:12px;min-width:32px;text-align:right;">0</span>
    </div>

  </div>

  <!-- Alive counter -->
  <div id="ac">👥 <span id="alive-num">?</span> ALIVE</div>

  <!-- Kill feed -->
  <div id="kf"></div>

  <!-- Crosshair -->
  <div id="ch">
    <svg width="28" height="28" viewBox="0 0 28 28">
      <circle cx="14" cy="14" r="2" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.9"/>
      <line x1="14" y1="2" x2="14" y2="9" stroke="#00e5ff" stroke-width="1.2" opacity="0.8"/>
      <line x1="14" y1="19" x2="14" y2="26" stroke="#00e5ff" stroke-width="1.2" opacity="0.8"/>
      <line x1="2" y1="14" x2="9" y2="14" stroke="#00e5ff" stroke-width="1.2" opacity="0.8"/>
      <line x1="19" y1="14" x2="26" y2="14" stroke="#00e5ff" stroke-width="1.2" opacity="0.8"/>
    </svg>
  </div>

  <!-- ADS overlay -->
  <div id="adsOverlay">
    <div style="position:absolute;top:0;left:0;width:28%;height:100%;background:rgba(2,12,28,0.82);"></div>
    <div style="position:absolute;top:0;right:0;width:28%;height:100%;background:rgba(2,12,28,0.82);"></div>
    <svg style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);" width="120" height="120">
      <circle cx="60" cy="60" r="54" fill="none" stroke="rgba(0,200,255,0.2)" stroke-width="1"/>
      <circle cx="60" cy="60" r="3" fill="#00e5ff" opacity="0.9"/>
      <line x1="6" y1="60" x2="46" y2="60" stroke="rgba(0,200,255,0.6)" stroke-width="1.2"/>
      <line x1="74" y1="60" x2="114" y2="60" stroke="rgba(0,200,255,0.6)" stroke-width="1.2"/>
      <line x1="60" y1="6" x2="60" y2="46" stroke="rgba(0,200,255,0.6)" stroke-width="1.2"/>
      <line x1="60" y1="74" x2="60" y2="114" stroke="rgba(0,200,255,0.6)" stroke-width="1.2"/>
    </svg>
  </div>

  <!-- Muzzle flash -->
  <div id="fl"></div>
  <!-- Damage vignette -->
  <div id="dmgo"></div>
  <!-- Hitmarker -->
  <div id="hmk"><svg width="18" height="18"><line x1="0" y1="0" x2="18" y2="18" stroke="#f00" stroke-width="2.5"/><line x1="18" y1="0" x2="0" y2="18" stroke="#f00" stroke-width="2.5"/></svg></div>

  <div id="rlt">RELOADING...</div>
  <div id="zdt">⚠️ ZONE DAMAGE!</div>
  <div id="zoneBox">🔴 ZONE<br><span id="zone-num" style="font-size:20px;color:#fff;">60</span>s</div>

  <!-- Chest prompt -->
  <div id="chestPrompt">
    <div>[E] HOLD TO OPEN 🔓</div>
    <div id="eBarWrap"><div id="eBar"></div></div>
  </div>

  <!-- Ground loot hint -->
  <div id="groundLootHint"></div>

  <!-- Loot popup -->
  <div id="lootPopup"></div>

  <!-- Inventory (4 slots) -->
  <div id="inv">
    <div class="invSlot active" id="s0"><span class="slotNum">1</span><span style="font-size:22px;">🔫</span><span style="font-size:8px;color:#ccc;">AK</span></div>
    <div class="invSlot empty" id="s1"><span class="slotNum">2</span><span style="font-size:22px;color:#333;">—</span></div>
    <div class="invSlot empty" id="s2"><span class="slotNum">3</span><span style="font-size:22px;color:#333;">—</span></div>
    <div class="invSlot empty" id="s3"><span class="slotNum">4</span><span style="font-size:22px;color:#333;">—</span></div>
  </div>

  <div id="tip">WASD = MOVE | LMB = FIRE | RMB = AIM | R = RELOAD | E (hold) = OPEN | 1-4 = WEAPON</div>
</div>

<!-- CLICK TO PLAY -->
<div id="click-screen">
  <h1>URBAN FRONTLINE</h1>
  <p id="waiting-msg">ממתין לשחקנים...</p>
  <p style="font-size:13px;color:#555;margin-top:16px;">לחץ כדי להתחיל</p>
</div>

<!-- DEAD/WIN -->
<div id="dead-screen">
  <h1>ELIMINATED</h1>
  <div class="end-sub" id="dead-msg">נפלת!</div>
  <button class="btn-back" onclick="window.location.href='/'">← חזור ללובי</button>
</div>
<div id="win-screen">
  <h1>VICTORY! 🏆</h1>
  <div class="end-sub">ניצחת!</div>
  <button class="btn-back" onclick="window.location.href='/'">← חזור ללובי</button>
</div>

<script>
const G = id => document.getElementById(id);

// ── PARAMS ──
const params = new URLSearchParams(window.location.search);
const MY_NAME = params.get('name') || 'Player';
const MY_ROOM = params.get('room') || '';
const MY_SKIN = params.get('skin') || 'rookie';
const ALL_PLAYERS = (params.get('players') || MY_NAME).split(',').filter(Boolean);
G('waiting-msg').textContent = `שלום ${MY_NAME}! שחקנים: ${ALL_PLAYERS.join(', ')}`;

// ── WEAPONS ──
const WEAPONS = {
  ak:   {name:'AK',  icon:'🔫',ammo:15,maxAmmo:15,reserve:60, fireRate:250, dmgBody:20,dmgHead:30,spread:0.01,reloadTime:2000,type:'auto'},
  rpg:  {name:'RPG', icon:'🚀',ammo:1, maxAmmo:1, reserve:3,  fireRate:5000,dmgBody:65,dmgHead:75,spread:0,   reloadTime:5000,type:'rpg'},
  knife:{name:'סכין',icon:'🔪',ammo:1, maxAmmo:1, reserve:999,fireRate:800, dmgBody:30,dmgHead:40,spread:0,   reloadTime:0,   type:'melee'},
};
const LOOT_POOL = [{wid:'ak',weight:50},{wid:'rpg',weight:10},{wid:'knife',weight:40}];

// ── STATE ──
let hp = 150, shield = 0, maxShield = 50;
let inventory = [{wid:'ak',ammo:15,reserve:60},null,null,null];
let activeSlot = 0;
let gameActive = false, reloading = false;
let yaw = 0, pitch = 0;
let velY = 0, isGrounded = true, wBob = 0;
let keys = {}, isADS = false, shootHeld = false;
let lastShot = 0;
let aliveCount = ALL_PLAYERS.length;
let peers = {}; // name → { mesh, hp, alive, label }
let lastSend = 0;
let groundItems = [];
let chests = [];
let zoneTime = 60, zoneRadius = 50;
let eHoldTimer = 0, ePrevHeld = false;
let popupTimer = null;

// ── THREE.JS ──
const canvas = G('cv');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a1828);
scene.fog = new THREE.Fog(0x0d1e30, 25, 80);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.05, 200);

// Lights
scene.add(new THREE.AmbientLight(0xaaddff, 0.55));
const sun = new THREE.DirectionalLight(0xccddff, 0.9);
sun.position.set(40, 60, 30);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-70; sun.shadow.camera.right=70;
sun.shadow.camera.top=70;   sun.shadow.camera.bottom=-70;
sun.shadow.camera.far=200;
scene.add(sun);
const fillLight = new THREE.DirectionalLight(0x0055aa, 0.4);
fillLight.position.set(-30, 20, -30);
scene.add(fillLight);

// ── VELOCITY ──
const vel = new THREE.Vector3();

// ── COLLIDERS ──
const colliders = [];

// ── MAP HELPERS ──
function W(w,h,d,col,x,y,z,solid){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshLambertMaterial({color:col}));
  m.position.set(x,y+h/2,z);m.castShadow=true;m.receiveShadow=true;scene.add(m);
  if(solid!==false){const hw=w/2+0.32,hd=d/2+0.32;colliders.push({minX:x-hw,maxX:x+hw,minZ:z-hd,maxZ:z+hd,topY:y+h});}
}
function CYL(r,h,col,x,y,z){
  const m=new THREE.Mesh(new THREE.CylinderGeometry(r,r,h,12),new THREE.MeshLambertMaterial({color:col}));
  m.position.set(x,y+h/2,z);m.castShadow=true;scene.add(m);
  const rr=r+0.32;colliders.push({minX:x-rr,maxX:x+rr,minZ:z-rr,maxZ:z+rr,topY:y+h});
}

function buildAbandonedCity(){
  // Dark foggy atmosphere
  scene.fog = new THREE.Fog(0x1a1a2a, 20, 120);
  scene.background = new THREE.Color(0x1a1a2a);

  // Ground — cracked concrete
  W(300,0.15,300,0x333333,0,-0.08,0,false);
  // Road markings
  W(6,0.05,200,0x444422,0,-0.02,0,false);
  W(200,0.05,6,0x444422,0,-0.02,0,false);

  // ── BUILDINGS ──
  const bColors = [0x4a4a4a,0x555555,0x4a3a3a,0x3a4a4a,0x404040,0x3a3a4a];
  const buildings = [
    // [x, z, w, h, d]
    [-25,-25, 14,28,12], [25,-25, 10,35,10], [-25,25, 12,22,14], [25,25, 16,40,12],
    [-50,0,  10,18,10], [50,0,   12,25,10],  [0,-50, 14,32,12],  [0,50,  10,20,14],
    [-40,-40,8, 15,8],  [40,-40, 10,20,10],  [-40,40,12,28,10],  [40,40, 8,18,12],
    [-15,-55,10,22,8],  [15,-55, 8, 18,10],  [-15,55,12,30,8],   [15,55, 10,25,10],
    [-60,-20,8, 12,8],  [60,-20, 10,16,8],   [-60,20,8, 20,10],  [60,20, 12,24,8],
    [-35,0,  6, 10,6],  [35,0,   8, 14,6],   [0,-30, 6, 12,8],   [0,30,  8, 16,6],
  ];
  buildings.forEach(([x,z,w,h,d],i)=>{
    const col = bColors[i%bColors.length];
    W(w,h,d,col,x,0,z);
    // Broken windows
    for(let wi=0;wi<3;wi++){
      const wx=x+(Math.random()-0.5)*w*0.6;
      const wy=2+Math.random()*(h-4);
      const wz=z+(d/2+0.1);
      W(1.2,1.0,0.1,0x111122,wx,wy,wz,false);
    }
    // Roof details
    W(w*0.4,1.5,d*0.4,col-0x111111>0?col-0x111111:0x333333,x,h+0.75,z,false);
  });

  // ── RUBBLE ──
  for(let i=0;i<60;i++){
    const rx=(Math.random()-0.5)*160;
    const rz=(Math.random()-0.5)*160;
    const rw=1+Math.random()*3, rh=0.5+Math.random()*2, rd=1+Math.random()*3;
    const m=new THREE.Mesh(new THREE.BoxGeometry(rw,rh,rd),new THREE.MeshLambertMaterial({color:0x444444}));
    m.position.set(rx,rh/2,rz);
    m.rotation.y=Math.random()*Math.PI;
    m.rotation.z=(Math.random()-0.5)*0.3;
    scene.add(m);
  }

  // ── ABANDONED CARS ──
  const carPositions = [[-10,-15],[10,15],[20,-5],[-20,10],[5,-35],[-5,35],[30,10],[-30,-10]];
  carPositions.forEach(([cx,cz])=>{
    W(4,1.2,2,0x334433,cx,0.6,cz);   // body
    W(2.5,0.8,1.9,0x223322,cx,1.5,cz-0.05,false); // cabin
    W(0.8,0.8,0.8,0x111111,cx-1.4,0.4,cz-0.8); // wheel FL
    W(0.8,0.8,0.8,0x111111,cx+1.4,0.4,cz-0.8); // wheel FR
    W(0.8,0.8,0.8,0x111111,cx-1.4,0.4,cz+0.8); // wheel RL
    W(0.8,0.8,0.8,0x111111,cx+1.4,0.4,cz+0.8); // wheel RR
  });

  // ── STREET LIGHTS (broken) ──
  [[-8,0],[8,0],[0,-8],[0,8],[-20,-20],[20,20],[-20,20],[20,-20]].forEach(([lx,lz])=>{
    W(0.2,7,0.2,0x334455,lx,0,lz,false);
    W(2,0.1,0.1,0x334455,lx,6.5,lz,false);
    // Some lights are on (orange glow)
    if(Math.random()>0.5){
      const glow=new THREE.Mesh(new THREE.BoxGeometry(0.3,0.3,0.3),new THREE.MeshLambertMaterial({color:0xff8800,emissive:0xff8800,emissiveIntensity:0.8}));
      glow.position.set(lx+1,6.5,lz);
      scene.add(glow);
    }
  });

  // ── BARRIERS & DEBRIS ──
  [[-5,0],[5,0],[0,-5],[0,5],[-12,8],[12,-8]].forEach(([bx,bz])=>{
    W(3,0.8,1,0x884422,bx,0.4,bz);
    W(0.1,1.2,0.1,0xcc4400,bx-1.4,0,bz,false);
    W(0.1,1.2,0.1,0xcc4400,bx+1.4,0,bz,false);
  });

  // Chests
  [[-22,-22],[22,-22],[-22,22],[22,22],[0,-45],[0,45],[-45,0],[45,0],
   [-10,-10],[10,10],[-10,10],[10,-10],[0,-20],[0,20],[-20,0],[20,0]].forEach(([cx,cz])=>spawnChest(cx,cz));
}

const MAP_TYPE = (new URLSearchParams(window.location.search)).get('map') || 'city';

// ── TERRAIN HEIGHT FUNCTION ──
let terrainHeightFn = null;

function buildNatureMap(){
  scene.fog = new THREE.Fog(0x87ceeb, 60, 200);
  scene.background = new THREE.Color(0x87ceeb);

  // Simplex noise terrain
  const simplex = new SimplexNoise();
  const segments = 150;
  const mapSize = 400;
  const geo = new THREE.PlaneGeometry(mapSize, mapSize, segments, segments);
  geo.rotateX(-Math.PI/2);

  const pos = geo.attributes.position;
  for(let i=0;i<pos.count;i++){
    const x = pos.getX(i);
    const z = pos.getZ(i);
    let y = simplex.noise2D(x*0.008, z*0.008) * 18
           + simplex.noise2D(x*0.02,  z*0.02)  * 6
           + simplex.noise2D(x*0.05,  z*0.05)  * 2;
    // Flatten center spawn area
    const distCenter = Math.sqrt(x*x+z*z);
    if(distCenter < 25) y *= (distCenter/25) * 0.3;
    pos.setY(i, y);
  }
  geo.computeVertexNormals();

  // Vertex colors by height
  const colors = [];
  for(let i=0;i<pos.count;i++){
    const y = pos.getY(i);
    if(y < -2)      colors.push(0.2,0.4,0.8);   // water
    else if(y < 2)  colors.push(0.76,0.70,0.50); // sand/beach
    else if(y < 10) colors.push(0.23,0.48,0.23); // grass
    else if(y < 16) colors.push(0.30,0.40,0.20); // hill
    else            colors.push(0.55,0.55,0.55); // rock/mountain
  }
  geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

  const terrainMat = new THREE.MeshLambertMaterial({vertexColors:true, flatShading:true});
  const terrainMesh = new THREE.Mesh(geo, terrainMat);
  terrainMesh.receiveShadow = true;
  scene.add(terrainMesh);

  // Height function for placement
  terrainHeightFn = (x,z) => {
    const y = simplex.noise2D(x*0.008,z*0.008)*18
             + simplex.noise2D(x*0.02,z*0.02)*6
             + simplex.noise2D(x*0.05,z*0.05)*2;
    const d = Math.sqrt(x*x+z*z);
    return d<25 ? y*(d/25)*0.3 : y;
  };

  // ── TREES ──
  function tree(x,z,h,r){
    const ty = terrainHeightFn(x,z);
    if(ty < 1 || ty > 15) return;
    const trunk = new THREE.Mesh(
      new THREE.CylinderGeometry(0.3,0.5,h,6),
      new THREE.MeshLambertMaterial({color:0x6B3A2A})
    );
    trunk.position.set(x,ty+h/2,z);
    scene.add(trunk);
    const leaves = new THREE.Mesh(
      new THREE.ConeGeometry(r,r*1.5,7),
      new THREE.MeshLambertMaterial({color:0x1a6b1a,flatShading:true})
    );
    leaves.position.set(x,ty+h+r*0.5,z);
    scene.add(leaves);
    const leaves2 = new THREE.Mesh(
      new THREE.ConeGeometry(r*0.7,r*1.2,7),
      new THREE.MeshLambertMaterial({color:0x228B22,flatShading:true})
    );
    leaves2.position.set(x,ty+h+r*1.0,z);
    scene.add(leaves2);
  }

  // Scatter trees
  for(let i=0;i<200;i++){
    const tx=(Math.random()-0.5)*350;
    const tz=(Math.random()-0.5)*350;
    const dist=Math.sqrt(tx*tx+tz*tz);
    if(dist>20) tree(tx,tz,3+Math.random()*4,2+Math.random()*2);
  }

  // ── ROCKS ──
  for(let i=0;i<80;i++){
    const rx=(Math.random()-0.5)*350;
    const rz=(Math.random()-0.5)*350;
    const ry=terrainHeightFn(rx,rz);
    if(ry<1) continue;
    const rs=0.5+Math.random()*2;
    const rock=new THREE.Mesh(
      new THREE.DodecahedronGeometry(rs,0),
      new THREE.MeshLambertMaterial({color:0x888877,flatShading:true})
    );
    rock.position.set(rx,ry+rs*0.5,rz);
    rock.rotation.set(Math.random(),Math.random(),Math.random());
    scene.add(rock);
    colliders.push({minX:rx-rs,maxX:rx+rs,minZ:rz-rs,maxZ:rz+rs,topY:ry+rs});
  }

  // ── WOOD CABINS ──
  function cabin(x,z){
    const gy=terrainHeightFn(x,z);
    W(8,3,6,0x6B3A2A,x,gy,z);
    W(8,0.3,6,0x4a2a1a,x,gy+3.15,z,false);
    // Roof
    const roofGeo=new THREE.ConeGeometry(5,3,4);
    const roof=new THREE.Mesh(roofGeo,new THREE.MeshLambertMaterial({color:0x4a2a1a,flatShading:true}));
    roof.position.set(x,gy+4.5,z);
    roof.rotation.y=Math.PI/4;
    scene.add(roof);
    // Door
    W(1.5,2.2,0.1,0x3a1a0a,x,gy+1.1,z-3.05,false);
    colliders.push({minX:x-4,maxX:x+4,minZ:z-3,maxZ:z+3,topY:gy+3});
  }
  [[-40,30],[40,-30],[60,60],[-60,-60],[0,80],[-80,0]].forEach(([cx,cz])=>cabin(cx,cz));

  // ── WATER ──
  const water=new THREE.Mesh(
    new THREE.PlaneGeometry(mapSize,mapSize),
    new THREE.MeshLambertMaterial({color:0x1a5f8a,transparent:true,opacity:0.7})
  );
  water.rotation.x=-Math.PI/2;
  water.position.y=-2.1;
  scene.add(water);

  // ── CHESTS ──
  for(let i=0;i<20;i++){
    const cx=(Math.random()-0.5)*200;
    const cz=(Math.random()-0.5)*200;
    const cy=terrainHeightFn(cx,cz);
    if(cy>0) spawnChest(cx,cz);
  }

  // Boundary
  W(1,30,mapSize,0x228822,mapSize/2,0,0);
  W(1,30,mapSize,0x228822,-mapSize/2,0,0);
  W(mapSize,30,1,0x228822,0,0,mapSize/2);
  W(mapSize,30,1,0x228822,0,0,-mapSize/2);
}

// ── COLLISION ──
const PLAYER_R=0.35, STEP_HEIGHT=0.85;
function resolveCollision(nx,nz){
  let rx=nx,rz=nz;const feetY=camera.position.y-1.55;
  for(const c of colliders){
    const cx2=(c.minX+c.maxX)/2,cz2=(c.minZ+c.maxZ)/2,hw=(c.maxX-c.minX)/2,hd=(c.maxZ-c.minZ)/2;
    const dx=rx-cx2,dz=rz-cz2,ox=hw+PLAYER_R-Math.abs(dx),oz=hd+PLAYER_R-Math.abs(dz);
    if(ox>0&&oz>0){
      const topY=c.topY||99;
      if(topY-feetY<=STEP_HEIGHT&&isGrounded){const nY=topY+1.55;if(nY>camera.position.y){camera.position.y=nY;velY=0;isGrounded=true;}}
      else{if(ox<oz)rx+=dx>0?ox:-ox;else rz+=dz>0?oz:-oz;}
    }
  }
  return{x:rx,z:rz};
}

// ── ZONE ──
function zoneUp(){
  if(!gameActive)return;
  zoneTime--;const zt=G('zone-num');if(zt)zt.textContent=Math.max(0,zoneTime);
  if(zoneTime<=0){zoneRadius=Math.max(6,zoneRadius-4);zoneTime=30;}
  const dist2=Math.sqrt(camera.position.x**2+camera.position.z**2);
  if(dist2>zoneRadius){
    let dmg=10;if(shield>0){const sd=Math.min(shield,dmg);shield-=sd;dmg-=sd;updateShield();}
    hp=Math.max(0,hp-dmg);updateHP();
    const zdt=G('zdt');if(zdt){zdt.style.display='block';setTimeout(()=>zdt.style.display='none',1200);}
    const do2=G('dmgo');if(do2){do2.style.opacity='0.45';setTimeout(()=>do2.style.opacity='0',400);}
    if(hp<=0&&gameActive)die('מתת מנזק האיזור!');
  }
}

// ── SHOOT ──
function shoot(){
  if(!gameActive||reloading)return;
  const aw=getActiveWeapon();if(!aw)return;
  const wd=getWeaponDef(aw.wid);
  if(aw.ammo<=0){doReload();return;}
  const now=Date.now();if(now-lastShot<wd.fireRate)return;
  lastShot=now;aw.ammo--;
  const fl=G('fl');if(fl){fl.style.display='block';setTimeout(()=>fl.style.display='none',55);}
  if(activeWgMesh)activeWgMesh.position.z+=0.025;
  // Recoil
  pitch-=0.005+Math.random()*0.003;yaw+=(Math.random()-0.5)*0.002;
  const dir=new THREE.Vector3((Math.random()-0.5)*wd.spread,(Math.random()-0.5)*wd.spread,-1).applyEuler(new THREE.Euler(pitch,yaw,0,'YXZ')).normalize();
  // Check multiplayer peer hits — body + head zones
  for(const [name,peer] of Object.entries(peers)){
    if(!peer.alive||!peer.mesh)continue;
    const base = peer.mesh.position.clone(); // feet position (Y=0 of model)
    // With scale 2.4: body center ~2.2m up, head center ~3.7m up
    const bodyPos = base.clone().add(new THREE.Vector3(0, 0.9, 0));
    const headPos = base.clone().add(new THREE.Vector3(0, 1.5, 0));
    const dist = base.distanceTo(camera.position);
    if(dist > 80) continue;

    let hit = false;
    let isHead = false;

    // Body hit — large hitbox 1.2m radius
    const toBody = bodyPos.clone().sub(camera.position);
    const crossBody = new THREE.Vector3().crossVectors(dir, toBody.clone().normalize());
    if(crossBody.length() * toBody.length() < 1.2 && dir.dot(toBody.clone().normalize()) > 0.5){
      hit = true; isHead = false;
    }
    // Head hit — 0.6m radius, overrides body
    const toHead = headPos.clone().sub(camera.position);
    const crossHead = new THREE.Vector3().crossVectors(dir, toHead.clone().normalize());
    if(crossHead.length() * toHead.length() < 0.6 && dir.dot(toHead.clone().normalize()) > 0.5){
      hit = true; isHead = true;
    }

    if(!hit) continue;
    const dmg = isHead ? wd.dmgHead : wd.dmgBody;
    const hmk=G('hmk');if(hmk){hmk.style.display='block';hmk.style.color=isHead?'#ff4400':'#ffffff';setTimeout(()=>hmk.style.display='none',150);}
    addKillFeed((isHead?'🎯 הדשוט! פגעת ב-':'פגעת ב-')+name+'!');
    socket.emit('shootHit',{room:MY_ROOM,target:name,shooter:MY_NAME,dmg});
    break;
  }
  renderInventory();
  if(aw.ammo<=0)setTimeout(doReload,300);
}

function doReload(){
  if(reloading)return;const aw=getActiveWeapon();if(!aw)return;
  const wd=getWeaponDef(aw.wid);if(wd.type==='melee')return;if(aw.ammo===wd.maxAmmo||aw.reserve<=0)return;
  reloading=true;const rlt=G('rlt');if(rlt){rlt.style.display='block';rlt.textContent='RELOADING...';}
  setTimeout(()=>{
    const n=Math.min(wd.maxAmmo-aw.ammo,aw.reserve);aw.ammo+=n;aw.reserve-=n;
    reloading=false;const r2=G('rlt');if(r2)r2.style.display='none';renderInventory();
  },wd.reloadTime);
}

// ── SOCKET ──
const socket = io();
socket.emit('joinGame',{room:MY_ROOM,name:MY_NAME});

socket.on('peerUpdate',({name,x,y,z,yaw:py,pitch:pp,wid,skin})=>{
  if(name===MY_NAME)return;
  if(!peers[name]){
    peers[name]={mesh:makePeerMesh(name,skin||'rookie'),hp:100,alive:true,wid:'ak',skin:skin||'rookie'};
    updateAlive();
  }
  const p=peers[name];
  if(p.mesh){
    // Add weapon on first update (buildAKMesh is now ready)
    const ud=p.mesh.userData;
    if(ud.needsWeapon && ud.rArm){
      const pw=buildAKMesh(); pw.scale.set(1.2,1.2,1.2); pw.position.set(0.10,-1.0,-0.30);
      ud.rArm.add(pw); ud.peerWeapon=pw; ud.needsWeapon=false;
    }
    p.mesh.position.set(x,y-1.55+1.1,z);
    p.mesh.rotation.y=py+Math.PI;
  }
  const ud=p.mesh.userData;
  if(ud){
    ud.walkT+=0.15;const w=Math.sin(ud.walkT)*0.5;
    if(ud.lLeg)ud.lLeg.rotation.x=w;if(ud.rLeg)ud.rLeg.rotation.x=-w;
    if(ud.lArm)ud.lArm.rotation.x=-w*0.4;if(ud.rArm)ud.rArm.rotation.x=w*0.4;
  }
});

socket.on('peerLeft',name=>{
  if(peers[name]?.mesh)scene.remove(peers[name].mesh);
  delete peers[name];updateAlive();
});
socket.on('playerLeft',name=>{
  if(peers[name]?.mesh)scene.remove(peers[name].mesh);
  delete peers[name];updateAlive();
});

socket.on('youHit',({by,dmg})=>{
  let d=dmg;
  if(shield>0){const sd=Math.min(shield,d);shield-=sd;d-=sd;updateShield();}
  hp=Math.max(0,hp-d);updateHP();
  const do2=G('dmgo');if(do2){do2.style.opacity='0.7';setTimeout(()=>do2.style.opacity='0',350);}
  if(hp<=0)die(by+' חיסל אותך!');
});

socket.on('peerDied',({name,killer})=>{
  if(peers[name]){if(peers[name].mesh)scene.remove(peers[name].mesh);peers[name].alive=false;}
  addKillFeed(killer+' ⚔️ '+name);updateAlive();
  const alivePeers=Object.values(peers).filter(p=>p.alive).length;
  if(alivePeers===0&&gameActive){gameActive=false;document.exitPointerLock();G('win-screen').style.display='flex';}
});

socket.on('gameOver',({winner})=>{
  gameActive=false;document.exitPointerLock();
  if(winner===MY_NAME){G('win-screen').style.display='flex';}
  else{G('dead-msg').textContent=winner+' ניצח!';G('dead-screen').style.display='flex';}
});

const clock = new THREE.Clock();
function update(){
  const dt=Math.min(clock.getDelta(),0.05);
  if(!gameActive)return;
  const eHeld=!!(keys['KeyE']||keys['e']);
  const eJustPressed=eHeld&&!ePrevHeld;ePrevHeld=eHeld;
  // Movement
  const fwd=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
  const rgt=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));
  const dir=new THREE.Vector3();
  if(keys['KeyW']||keys['w'])dir.addScaledVector(fwd,1);
  if(keys['KeyS']||keys['s'])dir.addScaledVector(fwd,-1);
  if(keys['KeyD']||keys['d'])dir.addScaledVector(rgt,1);
  if(keys['KeyA']||keys['a'])dir.addScaledVector(rgt,-1);
  if(dir.length()>0)dir.normalize();
  vel.addScaledVector(dir,2.2*dt);vel.multiplyScalar(0.72);
  const nx=camera.position.x+vel.x,nz=camera.position.z+vel.z;
  const res=resolveCollision(nx,nz);
  camera.position.x=Math.max(-41,Math.min(41,res.x));
  camera.position.z=Math.max(-41,Math.min(33,res.z));
  // Jump/gravity
  velY-=22*dt;camera.position.y+=velY*dt;
  if(camera.position.y<=1.55){camera.position.y=1.55;velY=0;isGrounded=true;}
  else{isGrounded=false;}
  if(!isGrounded&&velY<0){
    const feetY=camera.position.y-1.55;
    for(const c of colliders){const cx3=(c.minX+c.maxX)/2,cz3=(c.minZ+c.maxZ)/2,hw3=(c.maxX-c.minX)/2+0.1,hd3=(c.maxZ-c.minZ)/2+0.1,topY3=c.topY||0;if(Math.abs(camera.position.x-cx3)<hw3&&Math.abs(camera.position.z-cz3)<hd3&&feetY<=topY3&&feetY>=topY3-0.5){camera.position.y=topY3+1.7;velY=0;isGrounded=true;break;}}
  }
  if(keys['Space']&&isGrounded){velY=5.5;isGrounded=false;}
  // Auto-shoot
  if(shootHeld){const aw=getActiveWeapon();if(aw&&getWeaponDef(aw.wid).type==='auto')shoot();}
  // Camera
  camera.rotation.set(0,0,0,'YXZ');camera.rotateY(yaw);camera.rotateX(pitch);
  // Weapon bob
  if(dir.length()>0.01)wBob+=dt*7;
  const bxp=isADS?0:0.26,byp=isADS?-0.14:-0.31+Math.sin(wBob)*(dir.length()>0.01?0.011:0),bzp=isADS?-0.36:-0.5;
  if(activeWgMesh){activeWgMesh.position.x+=(bxp-activeWgMesh.position.x)*0.22;activeWgMesh.position.y+=(byp-activeWgMesh.position.y)*0.22;activeWgMesh.position.z+=(bzp-activeWgMesh.position.z)*0.18;}
  // ADS fov
  camera.fov+=((isADS?52:75)-camera.fov)*0.15;camera.updateProjectionMatrix();
  // Chest E-hold
  const lookDir=new THREE.Vector3(0,0,-1).applyEuler(new THREE.Euler(pitch,yaw,0,'YXZ'));
  const cRC=new THREE.Raycaster(camera.position,lookDir,0,3.5);
  const cHits=cRC.intersectObjects(chests.filter(c=>!c.open).map(c=>c.mesh),true);
  let nearChest=null;
  if(cHits.length>0){const hm2=cHits[0].object;nearChest=chests.find(c=>c.mesh===hm2||c.mesh.children.includes(hm2));}
  const giRC=new THREE.Raycaster(camera.position,lookDir,0,2.5);
  const giHits=giRC.intersectObjects(groundItems.map(gi=>gi.mesh),true);
  let nearGI=null;
  if(giHits.length>0){const hm3=giHits[0].object;nearGI=groundItems.find(gi=>gi.mesh===hm3||gi.mesh.children.includes(hm3));}
  const cp=G('chestPrompt'),gl2=G('groundLootHint'),eb=G('eBar');
  if(nearChest&&!nearGI){
    if(cp)cp.style.display='flex';if(gl2)gl2.style.display='none';
    if(eHeld){eHoldTimer+=dt;if(eb)eb.style.width=(eHoldTimer/2*100)+'%';if(eHoldTimer>=2){eHoldTimer=0;openChest(nearChest);}}
    else{eHoldTimer=Math.max(0,eHoldTimer-dt*3);if(eb)eb.style.width=(eHoldTimer/2*100)+'%';}
  } else if(nearGI){
    if(cp)cp.style.display='none';
    const wd3=WEAPONS[nearGI.wid];if(gl2){gl2.textContent='[E] אסוף '+wd3.icon+' '+wd3.name;gl2.style.display='block';}
    if(eJustPressed){const dropped=pickupWeapon(nearGI.wid,nearGI.ammo,nearGI.reserve);if(dropped)spawnGroundItem(dropped.wid,dropped.ammo,dropped.reserve,nearGI.pos.x+0.6,nearGI.pos.z+0.3);removeGroundItem(nearGI);}
  } else {
    if(cp)cp.style.display='none';if(gl2)gl2.style.display='none';
    eHoldTimer=Math.max(0,eHoldTimer-dt*3);if(eb)eb.style.width=(eHoldTimer/2*100)+'%';
  }
  // Animate chests
  chests.forEach(c=>{if(!c.open&&c.glow)c.glow.intensity=0.8+Math.sin(Date.now()*0.003)*0.5;});
  // Animate ground items
  groundItems.forEach(gi=>{gi.mesh.position.y=0.35+Math.sin(Date.now()*0.002+gi.pos.x)*0.06;gi.mesh.rotation.y+=dt*1.2;});
  // Send position
  const now=Date.now();
  if(now-lastSend>50){lastSend=now;const aw=getActiveWeapon();socket.emit('playerMove',{room:MY_ROOM,name:MY_NAME,x:camera.position.x,y:camera.position.y,z:camera.position.z,yaw,pitch,wid:aw?.wid||'ak',skin:MY_SKIN});}
}

function animate(){
  requestAnimationFrame(animate);
  update();
  renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});

// ── SPAWN & INIT ──
const SPAWNS=[[-26,24],[26,24],[-26,6],[26,6],[0,10],[-22,-18],[26,-8],[0,-26]];
const mySpawnIdx = ALL_PLAYERS.indexOf(MY_NAME) % SPAWNS.length;
const sp = SPAWNS[mySpawnIdx] || [0,0];
camera.position.set(sp[0],1.55,sp[1]);
yaw=Math.atan2(-sp[0],-sp[1]);

if(MAP_TYPE === 'abandoned') buildAbandonedCity();
else if(MAP_TYPE === 'nature') buildNatureMap();
else buildMap();
buildAllGuns();
renderInventory();
animate();
</script>
</body>
</html>
